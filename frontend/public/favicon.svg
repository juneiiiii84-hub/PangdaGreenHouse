<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background circle/globe for modern look -->
  <circle cx="256" cy="256" r="240" fill="#e8f5e9" />
  
  <!-- Greenhouse structure -->
  <!-- Cute rounded greenhouse dome -->
  <path d="M120 380 L120 280 C120 180 200 120 256 120 C312 120 392 180 392 280 L392 380 Z" fill="#ffffff" stroke="#2e7d32" stroke-width="20" stroke-linejoin="round" />
  
  <!-- Ground inside greenhouse -->
  <path d="M130 380 L382 380" stroke="#8d6e63" stroke-width="16" stroke-linecap="round" />
  
  <!-- Glass grid lines (cute curved outline style) -->
  <path d="M256 120 L256 380" stroke="#a5d6a7" stroke-width="12" stroke-dasharray="2 2" />
  <path d="M120 260 L392 260" stroke="#a5d6a7" stroke-width="10" />
  <path d="M150 200 C200 180 312 180 362 200" fill="none" stroke="#a5d6a7" stroke-width="10" />
  
  <!-- Cute little green plants growing inside -->
  <!-- Plant 1 (Middle) -->
  <path d="M256 380 Q256 320 240 300 Q260 280 280 300 Q280 320 256 380" fill="#4caf50" />
  <path d="M256 380 Q256 330 275 320 Q290 310 295 330 Q280 350 256 380" fill="#81c784" />
  <!-- Plant 2 (Left) -->
  <path d="M190 380 Q195 340 185 330 Q195 320 205 330 Q200 350 190 380" fill="#388e3c" />
  <!-- Plant 3 (Right) -->
  <path d="M320 380 Q315 345 325 335 Q335 325 330 345 Q325 365 320 380" fill="#2e7d32" />
  
  <!-- Cute little flower -->
  <circle cx="270" cy="290" r="10" fill="#ffeb3b" />
  <circle cx="280" cy="280" r="8" fill="#ff4081" />
  <circle cx="260" cy="280" r="8" fill="#ff4081" />
  <circle cx="270" cy="270" r="8" fill="#ff4081" />
  <circle cx="270" cy="300" r="8" fill="#ff4081" />

  <!-- Cute smiling sun on top left outside -->
  <g transform="translate(100, 100)">
    <circle cx="0" cy="0" r="30" fill="#ffb74d" />
    <path d="M-40 0 L-30 0 M40 0 L30 0 M0 -40 L0 -30 M0 40 L0 30 M-28 -28 L-21 -21 M28 28 L21 21 M-28 28 L-21 21 M28 -28 L21 -21" stroke="#ffa726" stroke-width="8" stroke-linecap="round" />
    <!-- Sun eyes & smile -->
    <circle cx="-10" cy="-5" r="4" fill="#3e2723" />
    <circle cx="10" cy="-5" r="4" fill="#3e2723" />
    <path d="M-8 8 Q0 15 8 8" fill="none" stroke="#3e2723" stroke-width="4" stroke-linecap="round" />
  </g>
  
  <!-- Heart icon representing love for plants -->
  <path d="M370 120 C360 100 330 100 320 120 C310 100 280 100 270 120 C260 140 290 170 320 190 C350 170 380 140 370 120 Z" fill="#ff5252" />
</svg>